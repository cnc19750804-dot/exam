{q:"買電腦時，店員激動地推銷：「這台的『大腦』超級聰明，跑很雷的隊友也不怕卡！」請問這個「大腦」是指哪一個零件？",o:[{t:"硬碟 (HDD/SSD)",r:"硬碟是負責長期裝東西的「倉庫」，它記性很好但不負責動腦思考喔。",k:0},{t:"中央處理器 (CPU)",r:"沒錯！CPU 就是整台電腦的智商擔當，負責算數學跟指揮大家做事。",k:1},{t:"主記憶體 (RAM)",r:"記憶體比較像是暫時放資料的「書桌」，桌子再大也不會幫你寫作業。",k:0},{t:"顯示卡 (GPU)",r:"顯示卡是負責畫畫的「美術大師」，不是總指揮。",k:0}],h:"它的知名品牌有 Intel (像 i5、i7) 還有 AMD 喔！"},
{q:"你急著上線打排位賽，結果電腦開機等了 3 分鐘，泡麵都快糊了！為了解救開機速度，你最該把系統裝在哪裡？",o:[{t:"傳統硬碟 (HDD)",r:"傳統硬碟是用磁盤慢慢轉，像在圖書館慢慢找書，速度超級慢！",k:0},{t:"固態硬碟 (SSD)",r:"正解！SSD 裡面沒有會轉的零件，讀取資料就像開了任意門，開機只要 5 秒鐘！",k:1},{t:"雲端硬碟 (Google Drive)",r:"雲端是用來備份檔案的，你的電腦還是得靠自己的硬碟來開機呀。",k:0},{t:"行動電源",r:"行動電源只能給你電，不能給你速度啦！",k:0}],h:"找那種裡面沒有機械構造、讀取速度快如閃電的酷東西。"},
{q:"你一邊聽 Spotify，一邊開著 30 個 Google 分頁找報告資料，電腦突然卡死不動，連滑鼠都變樹懶。這通常是因為哪裡的「空間被塞爆了」？",o:[{t:"主記憶體 (RAM)",r:"答對了！這就像你的「書桌」太小，攤開太多課本放不下，電腦就會大當機。",k:1},{t:"硬碟 (Storage)",r:"硬碟是用來長久存檔的，純粹開太多分頁通常是先耗盡「暫存空間(書桌)」。",k:0},{t:"螢幕尺寸",r:"螢幕小只會讓你眼睛酸，不會讓電腦卡死喔。",k:0},{t:"電源供應器",r:"電源只是供電，跟能同時開幾個分頁無關。",k:0}],h:"想像你的「書桌」面積有限，放太多東西就會滿出來，必須重開機(收書包)清空。"},
{q:"如果電腦是一個大企業，誰是那個負責管整間公司、指派硬體工作，還會給你一個漂亮視窗介面點擊的「總經理」？",o:[{t:"防毒軟體 (Anti-Virus)",r:"防毒軟體比較像是大樓警衛，負責抓壞人，不管公司營運。",k:0},{t:"作業系統 (OS)",r:"沒錯！像 Windows、macOS 都是作業系統，沒有它，軟硬體就會互相聽不懂對方講話。",k:1},{t:"瀏覽器 (Chrome)",r:"瀏覽器只是讓你上網的工具，它是總經理底下的一名小員工而已。",k:0},{t:"文書軟體 (Word)",r:"Word 負責幫你打報告，不負責管硬體。",k:0}],h:"你每天開機第一眼看到在轉圈圈的 Windows 就是它。"},
{q:"網購推銷：「這台有 1TB 超大空間！」請問 1TB 大概等於多少 GB？",o:[{t:"100 GB",r:"太小看 TB 了！",k:0},{t:"1000 GB",r:"正解！1 TB = 1000 GB！",k:1},{t:"10000 GB",r:"那叫做 10TB。",k:0},{t:"10 GB",r:"這連一個手遊都裝不下！",k:0}],h:"T (Tera) 是 G (Giga) 的下一個大單位，換算通常是加三個零。"},

{q:"為了不被駭客盜帳號，哪一種密碼設定方式最像「鋼鐵保險箱」？",o:[{t:"用自己的生日 (如 920520)",r:"駭客去你的 IG 看一下就知道你哪天生日了！",k:0},{t:"所有網站都用同一組密碼",r:"只要一個網站被破解，所有帳號都會像骨牌全倒！",k:0},{t:"大小寫英數加符號，每個網站密碼都不一樣",r:"正解！大幅增加暴力破解的難度！",k:1},{t:"把密碼寫在便利貼貼在螢幕旁",r:"這叫「物理外洩」，同學走過去全看到了！",k:0}],h:"密碼越複雜越難打，而且大門跟保險箱絕對不能用同一把鑰匙。"},
{q:"期末報告死線快到了！你在網路上看到一篇超棒的文章想拿來用，怎樣做才不會被 Naichen 老師死當？",o:[{t:"整段複製貼上，裝作自己寫的",r:"這叫嚴重抄襲！老師用軟體一查就抓到了。",k:0},{t:"偷改掉幾個字就不算抄襲",r:"這叫「改寫抄襲」，沒標來源一樣違反學術規定！",k:0},{t:"用自己的話總結重點，並放上參考資料網址",r:"完美！尊重原作者並清楚交代來源！",k:1},{t:"把文章截圖放進報告裡",r:"用圖片也是引用，不標來源一樣母湯！",k:0}],h:"回想一下老師在報告格式規定裡的嚴厲提醒。"},
{q:"最近大家都在玩 ChatGPT，這位超級 AI 助理是靠哪種魔法練成的？",o:[{t:"區塊鏈 (Blockchain)",r:"區塊鏈主要用來記帳和發行虛擬貨幣。",k:0},{t:"擴增實境 (AR)",r:"這是像寶可夢 GO 那樣的技術。",k:0},{t:"生成式人工智慧 (Generative AI)",r:"答對了！它學會了如何「生成」像人類講話的內容。",k:1},{t:"量子運算",r:"ChatGPT 還不需要量子電腦。",k:0}],h:"這項技術讓電腦能夠自己「產出、創造」新的內容。"},
{q:"人還沒到家就用手機把冷氣打開；智慧手錶監控心跳。這種「萬物連上網」的魔法叫什麼？",o:[{t:"虛擬實境 (VR)",r:"VR 是戴頭盔進入虛擬世界，跟開冷氣無關。",k:0},{t:"物聯網 (IoT)",r:"沒錯！Internet of Things，讓物品都連上網路變聰明！",k:1},{t:"元宇宙 (Metaverse)",r:"元宇宙是虛擬社交空間，不是控制家電的。",k:0},{t:"比特幣 (Bitcoin)",r:"這是虛擬錢幣，不能幫你量心跳！",k:0}],h:"中文字面意思就是「物」品都「聯」上「網」路了。"},
{q:"為了讓「自動駕駛車」能瞬間煞車，我們急需哪一種「超低延遲」通訊技術？",o:[{t:"3G 網路",r:"用 3G，車子可能已經撞上去了...",k:0},{t:"藍牙 (Bluetooth)",r:"藍牙距離太短，只能連耳機。",k:0},{t:"5G 通訊技術",r:"正確！5G 超低延遲，是自駕車的保命符！",k:1},{t:"紅外線 (IR)",r:"紅外線不能有東西擋住，馬路上行不通。",k:0}],h:"目前最新一代行動網路標準，比 4G 快幾十倍。"},
{q:"哪一種未來科技被形容會「影分身之術」，可以同時走完迷宮所有路線？",o:[{t:"傳統超級電腦",r:"傳統電腦再強也是一次走一條路。",k:0},{t:"邊緣運算",r:"這只是把運算移到離你近的地方。",k:0},{t:"量子電腦 (Quantum Computer)",r:"沒錯！利用量子疊加態，運算力大爆發！",k:1},{t:"光纖網路",r:"光纖是傳輸線路，不具備運算能力。",k:0}],h:"名稱聽起來很有「漫威電影」物理學的感覺。"},
{q:"報告打到一半電腦突然卡死，你最應該先嘗試的「IT 神聖儀式」是什麼？",o:[{t:"把硬碟拆下來吹一吹",r:"千萬不要！電腦會直接報銷！",k:0},{t:"將電腦重新開機 (Restart)",r:"正解！能解決 90% 的電腦小毛病！",k:1},{t:"用力拍打電腦主機三下",r:"這只對古老真空管電視有效！",k:0},{t:"立刻拔掉網路線",r:"除非被駭客攻擊，斷網不能解決卡死。",k:0}],h:"經典 IT 名言：「遇到問題，先＿＿試試看。」"},
{q:"在家族 LINE 群組看到：「震驚！每天吃這顆水果，癌症都能治好！」你應該先做什麼？",o:[{t:"先轉傳給十個朋友",r:"這就是假新聞氾濫的元兇！",k:0},{t:"看底下有沒有長輩說「感恩分享」",r:"長輩的回覆不能當科學證據！",k:0},{t:"去事實查核中心 (如 MyGoPen、TFC) 查看看",r:"非常優秀！培養批判性思考是數位公民必備素養！",k:1},{t:"把標題改更聳動再發到 IG 限動",r:"這樣你也會變成散佈謠言的共犯！",k:0}],h:"不要輕易相信來源不明的文字，需要「客觀的驗證單位」。"},
{q:"網購筆電看到「On board 記憶體 8GB」，這代表什麼？",o:[{t:"附贈免費衝浪板",r:"英文不是這樣翻的！",k:0},{t:"記憶體被銲死在主機板上，無法擴充！",r:"答對了！買之前一定要確認容量夠不夠！",k:1},{t:"這台可以帶上飛機",r:"所有筆電都能帶上飛機。",k:0},{t:"開機速度比別人快一倍",r:"銲接主機板上不代表速度變快。",k:0}],h:"想像書桌被強力膠黏在地板上，以後換不了大桌子。"},
{q:"現在買新手機，通常只有一種「正反面都能插」的接孔，它叫什麼？",o:[{t:"USB Type-A",r:"這是傳統長方形 USB，每次都要插三次才對！",k:0},{t:"VGA 介面",r:"這是古老的藍色大頭影像線。",k:0},{t:"USB Type-C",r:"正確！連最新 iPhone 都改用它了！",k:1},{t:"耳機孔 (3.5mm)",r:"耳機孔是圓形的，很多手機都取消了。",k:0}],h:"最新蘋果手機被歐盟規定必須改成這種接孔。"},
{q:"在星巴克連上免費公共 Wi-Fi 時，做哪件事最容易讓駭客把你的錢搬光？",o:[{t:"看 YouTube MV",r:"看影片不涉及輸入密碼，風險較低。",k:0},{t:"用 Google 查天氣",r:"查天氣是公開資訊，不會造成財產損失。",k:0},{t:"登入網路銀行轉帳",r:"千萬母湯！公共 Wi-Fi 很容易被駭客側錄！",k:1},{t:"看學校網站行事曆",r:"不需輸入帳密，單純瀏覽是安全的。",k:0}],h:"想想哪件事被駭客偷看到會讓你當場破產。"}
];

function shuf(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}
function grd(s,t){const p=s/t;if(p>=.9)return{e:"🏆",t:"電腦天才！",s:"你根本是 IT 部門本人吧？",c:"#FFD700"};if(p>=.7)return{e:"🌟",t:"數位達人！",s:"你的資訊素養超越 87% 的人！",c:"#7CF5FF"};if(p>=.5)return{e:"📱",t:"科技小白進化中",s:"再加把勁就能成為科技達人！",c:"#A78BFA"};return{e:"🐣",t:"數位新生兒",s:"沒關係！看完解答你已經升級了！",c:"#FB923C"}}
async function postScore(d){try{await fetch(SCORE_API,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},body:JSON.stringify(d)});return"ok"}catch(e){return"er"}}

function Login({onOk}){
  const[sid,setS]=useState("");const[pw,setP]=useState("");const[err,setE]=useState("");
  const go=()=>{
    const s=sid.trim(),p=pw.trim();
    if(!s||!p){setE("請輸入學號和密碼");return}
    const stu=STUDENTS[s];
    if(!stu){setE("查無此學號");return}
    if(p!==getPw(s)){setE("密碼錯誤");return}
    const chg=!hasChangedPw(s);
    onOk({sid:s,name:stu.n,cls:stu.c,chg});
  };
  return(<div className="card" style={{maxWidth:420,marginTop:50,textAlign:"center"}}><div style={{fontSize:56,marginBottom:12}}>🔐</div><h1 style={{fontSize:28,fontWeight:900,marginBottom:8}}>資訊素養大挑戰</h1><p style={{fontSize:14,color:"#94a3b8",marginBottom:24}}>請用學號登入開始測驗</p><div style={{textAlign:"left",marginBottom:16}}><label className="fl">學號</label><input className={"fi"+(err&&!sid.trim()?" err":"")} placeholder="請輸入學號" value={sid} onChange={e=>setS(e.target.value)} onKeyDown={e=>e.key==="Enter"&&document.getElementById("pw")?.focus()}/></div><div style={{textAlign:"left",marginBottom:20}}><label className="fl">密碼</label><input id="pw" type="password" className={"fi"+(err&&!pw.trim()?" err":"")} placeholder="首次登入密碼為學號" value={pw} onChange={e=>setP(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()}/></div>{err&&<p className="em">⚠️ {err}</p>}<button className="bp" onClick={go}>登入 →</button><p style={{fontSize:11,color:"#475569",marginTop:16}}>首次登入密碼為學號，登入後需修改密碼</p><p style={{fontSize:10,color:"#334155",marginTop:8}}>v4.0 | 2026-02-24</p></div>);
}

function ChgPw({stu,onOk}){
  const[np,setN]=useState("");const[np2,setN2]=useState("");const[err,setE]=useState("");
  const go=()=>{if(np.length<4){setE("新密碼至少 4 個字元");return}if(np===stu.sid){setE("新密碼不能和學號一樣");return}if(np!==np2){setE("兩次密碼不一致");return}setPw(stu.sid,np);onOk()};
  return(<div className="card" style={{maxWidth:420,marginTop:50,textAlign:"center"}}><div style={{fontSize:48,marginBottom:8}}>🔑</div><h2 style={{fontSize:22,fontWeight:800,marginBottom:6}}>首次登入，請修改密碼</h2><p style={{fontSize:14,color:"#94a3b8",marginBottom:20}}>Hi {stu.name}，為了帳號安全請設定新密碼</p><div style={{textAlign:"left",marginBottom:16}}><label className="fl">新密碼（至少 4 字元）</label><input type="password" className="fi" placeholder="輸入新密碼" value={np} onChange={e=>setN(e.target.value)}/></div><div style={{textAlign:"left",marginBottom:20}}><label className="fl">確認新密碼</label><input type="password" className="fi" placeholder="再輸入一次" value={np2} onChange={e=>setN2(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()}/></div>{err&&<p className="em">⚠️ {err}</p>}<button className="bp" onClick={go}>確認修改 ✓</button></div>);
}

function Quiz({stu,onEnd}){
  const[c,setC]=useState(0);const[sel,setSel]=useState(null);const[done,setDone]=useState(false);const[sc,setSc]=useState(0);const[ht,setHt]=useState(false);const[rec,setRec]=useState([]);const[opts,setOpts]=useState([]);
  useEffect(()=>{setOpts(shuf(Q[c].o))},[c]);
  const pick=i=>{if(done)return;setSel(i);setDone(true);if(opts[i].k)setSc(s=>s+1);setRec(r=>[...r,{qi:c,ct:opts[i].t,ok:!!opts[i].k}])};
  const nxt=()=>{if(c<Q.length-1){setC(x=>x+1);setSel(null);setDone(false);setHt(false)}else{onEnd(rec.reduce((a,r)=>a+(r.ok?1:0),0),rec)}};
  const q=Q[c];const pct=((c+1)/Q.length)*100;
  return(<div className="card" style={{maxWidth:640}} key={c}>
    <div className="sbar"><span>👤 {stu.name}</span><span className="sep">|</span><span className="dim">{stu.sid}</span><span className="sep">|</span><span className="cls">{stu.cls}</span></div>
    <div className="pr"><span className="pl">{c+1} / {Q.length}</span><span className="si">🏅 {sc} 分</span></div>
    <div className="pb"><div className="pf" style={{width:pct+"%"}}/></div>
    <h2 className="qt">{q.q}</h2>
    {!done&&<button className="hb" onClick={()=>setHt(!ht)}>{ht?"💡 "+q.h:"💡 需要提示嗎？"}</button>}
    <div className="oc">{opts.map((o,i)=>{let cn="ob";if(done){if(o.k)cn+=" ok";else if(i===sel)cn+=" no";else cn+=" dm"}return(<button key={i} className={cn} onClick={()=>pick(i)} disabled={done}><span className="ol">{String.fromCharCode(65+i)}</span><span style={{flex:1}}>{o.t}</span>{done&&i===sel&&<span style={{marginLeft:"auto",fontSize:18}}>{o.k?"✅":"❌"}</span>}{done&&o.k&&i!==sel&&<span style={{marginLeft:"auto",fontSize:18}}>✅</span>}</button>)})}</div>
    {done&&<div className={"fb "+(opts[sel]?.k?"ok":"no")}><span style={{fontSize:24}}>{opts[sel]?.k?"🎉":"😅"}</span><span style={{fontWeight:700,color:opts[sel]?.k?"#4ade80":"#f87171",fontSize:15}}>{opts[sel]?.k?"答對了！":"答錯了！"}</span><span style={{color:"#64748b",fontSize:12}}>詳解於測驗結束後公布</span></div>}
    {done&&<button className="bp" onClick={nxt}>{c<Q.length-1?"下一題 →":"查看成績 🎯"}</button>}
  </div>);
}

function Result({stu,sc,rec,onOut}){
  const g=grd(sc,Q.length);const[sh,setSh]=useState(false);const[ss,setSs]=useState("ld");
  useEffect(()=>{postScore({action:"submit_score",sid:stu.sid,name:stu.name,className:stu.cls,score:sc,total:Q.length,record:rec.map(r=>({correct:r.ok}))}).then(r=>setSs(r))},[]);
  return(<div className="card" style={{maxWidth:580,textAlign:"center",marginTop:20}}>
    <div className="sbar" style={{justifyContent:"center",marginBottom:20}}><span>👤 {stu.name}</span><span className="sep">|</span><span className="dim">{stu.sid}</span><span className="sep">|</span><span className="cls">{stu.cls}</span></div>
    <div style={{fontSize:56,marginBottom:4}}>{g.e}</div><h1 style={{fontSize:28,fontWeight:900,color:g.c,marginBottom:6}}>{g.t}</h1><p style={{fontSize:15,color:"#94a3b8",marginBottom:24}}>{g.s}</p>
    <div className="sr"><div className="n">{sc}</div><div className="d">/ {Q.length}</div></div>
    <div className="stw"><div className="stb"><div className="stn" style={{color:"#4ade80"}}>{sc}</div><div className="stl">答對</div></div><div className="stb"><div className="stn" style={{color:"#f87171"}}>{Q.length-sc}</div><div className="stl">答錯</div></div><div className="stb"><div className="stn" style={{color:"#facc15"}}>{Math.round(sc/Q.length*100)}%</div><div className="stl">正確率</div></div></div>
    {ss==="ld"&&<div className="sm ld"><span className="ld"/>正在回傳成績...</div>}
    {ss==="ok"&&<div className="sm ok">✅ 成績已成功回傳！</div>}
    {ss==="er"&&<div className="sm er">⚠️ 回傳失敗，請截圖給老師</div>}
    <button className="rt" onClick={()=>setSh(!sh)}>{sh?"收起詳解 ▲":"📖 查看每題詳解 ▼"}</button>
    {sh&&<div className="rl">{rec.map((r,i)=>{const qd=Q[r.qi];const co=qd.o.find(x=>x.k);return(<div key={i} className={"ri "+(r.ok?"ok":"no")}><div className="rh"><span>{r.ok?"✅":"❌"}</span><span className="rqn">Q{i+1}</span></div><p className="rqt">{qd.q}</p>{!r.ok&&<div className="ry"><span style={{color:"#f87171",fontWeight:600}}>你的回答：</span>{r.ct}</div>}<div className="rc"><span style={{color:"#4ade80",fontWeight:600}}>正確答案：</span>{co.t}</div><div className="rr">{co.r}</div></div>)})}</div>}
    <button className="bp" style={{marginTop:12}} onClick={onOut}>登出 🔄</button>
  </div>);
}

function App(){
  const[ph,setPh]=useState("login");const[stu,setStu]=useState(null);const[fs,setFs]=useState(0);const[rec,setRec]=useState([]);
  if(ph==="login")return<Login onOk={s=>{setStu(s);setPh(s.chg?"chgpw":"quiz")}}/>;
  if(ph==="chgpw")return<ChgPw stu={stu} onOk={()=>setPh("quiz")}/>;
  if(ph==="quiz")return<Quiz stu={stu} onEnd={(s,r)=>{setFs(s);setRec(r);setPh("result")}}/>;
  return<Result stu={stu} sc={fs} rec={rec} onOut={()=>{setPh("login");setStu(null);setFs(0);setRec([])}}/>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
