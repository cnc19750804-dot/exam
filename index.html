function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getGrade(score, total) {
  const pct = score / total;
  if (pct >= 0.9) return { emoji: "🏆", title: "電腦天才！", sub: "你根本是 IT 部門本人吧？", color: "#FFD700" };
  if (pct >= 0.7) return { emoji: "🌟", title: "數位達人！", sub: "你的資訊素養超越 87% 的人！", color: "#7CF5FF" };
  if (pct >= 0.5) return { emoji: "📱", title: "科技小白進化中", sub: "再加把勁就能成為科技達人！", color: "#A78BFA" };
  return { emoji: "🐣", title: "數位新生兒", sub: "沒關係！看完解答你已經升級了！", color: "#FB923C" };
}

// 回傳成績到 Google Sheet
async function submitToSheet(student, score, record) {
  if (!GOOGLE_SCRIPT_URL || GOOGLE_SCRIPT_URL.includes("在這裡貼上")) return "skip";
  try {
    await fetch(GOOGLE_SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        sid: student.sid,
        name: student.name,
        score: score,
        total: quizData.length,
        record: record.map(r => ({ correct: r.correct }))
      })
    });
    return "ok";
  } catch (e) {
    console.error("Submit error:", e);
    return "error";
  }
}

function StudentForm({ onSubmit }) {
  const [sid, setSid] = useState("");
  const [name, setName] = useState("");
  const [showErr, setShowErr] = useState(false);

  const handle = () => {
    if (!sid.trim() || !name.trim()) { setShowErr(true); return; }
    onSubmit({ sid: sid.trim(), name: name.trim() });
  };

  return (
    <div className="card" style={{ maxWidth: 440, marginTop: 60, textAlign: "center" }}>
      <div style={{ fontSize: 56, marginBottom: 12 }}>🖥️</div>
      <h1 style={{ fontSize: 30, fontWeight: 900, marginBottom: 10, letterSpacing: 1 }}>資訊素養大挑戰</h1>
      <p style={{ fontSize: 15, color: "#94a3b8", marginBottom: 20, lineHeight: 1.6 }}>
        20 題趣味問答，測試你的電腦 &amp; 網路知識！
      </p>
      <div style={{ display: "flex", gap: 10, justifyContent: "center", marginBottom: 28, flexWrap: "wrap" }}>
        <span className="tag">📝 20 題</span>
        <span className="tag">⏱ 約 10 分鐘</span>
        <span className="tag">💡 附提示</span>
      </div>
      <div style={{ textAlign: "left", marginBottom: 20 }}>
        <label className="field-label">學號 *</label>
        <input className={`field-input ${showErr && !sid.trim() ? "error" : ""}`} placeholder="請輸入學號" value={sid} onChange={e => setSid(e.target.value)} onKeyDown={e => e.key === "Enter" && document.getElementById("ni")?.focus()} />
      </div>
      <div style={{ textAlign: "left", marginBottom: 28 }}>
        <label className="field-label">姓名 *</label>
        <input id="ni" className={`field-input ${showErr && !name.trim() ? "error" : ""}`} placeholder="請輸入姓名" value={name} onChange={e => setName(e.target.value)} onKeyDown={e => e.key === "Enter" && handle()} />
      </div>
      {showErr && (!sid.trim() || !name.trim()) && <p className="error-msg">⚠️ 請填寫學號和姓名才能開始測驗</p>}
      <button className="btn-primary" onClick={handle}>開始測驗 →</button>
    </div>
  );
}

function QuizPhase({ student, onFinish }) {
  const [cur, setCur] = useState(0);
  const [sel, setSel] = useState(null);
  const [answered, setAnswered] = useState(false);
  const [score, setScore] = useState(0);
  const [showHint, setShowHint] = useState(false);
  const [record, setRecord] = useState([]);
  const [opts, setOpts] = useState([]);

  useEffect(() => { setOpts(shuffleArray(quizData[cur].opts)); }, [cur]);

  const pick = idx => {
    if (answered) return;
    setSel(idx); setAnswered(true);
    const correct = opts[idx].ok;
    if (correct) setScore(s => s + 1);
    setRecord(r => [...r, { qIdx: cur, chosenText: opts[idx].text, correct }]);
  };

  const next = () => {
    if (cur < quizData.length - 1) {
      setCur(c => c + 1); setSel(null); setAnswered(false); setShowHint(false);
    } else {
      const fs = record.reduce((s, r) => s + (r.correct ? 1 : 0), 0);
      onFinish(fs, record);
    }
  };

  const q = quizData[cur];
  const pct = ((cur + 1) / quizData.length) * 100;

  return (
    <div className="card" style={{ maxWidth: 640 }} key={cur}>
      <div className="student-bar">
        <span>👤 {student.name}</span><span className="sep">|</span><span className="sid">{student.sid}</span>
      </div>
      <div className="progress-row">
        <span className="progress-label">{cur + 1} / {quizData.length}</span>
        <span className="score-inline">🏅 {score} 分</span>
      </div>
      <div className="progress-bar"><div className="progress-fill" style={{ width: pct + "%" }} /></div>
      <h2 className="question-text">{q.q}</h2>
      {!answered && <button className="hint-btn" onClick={() => setShowHint(!showHint)}>{showHint ? "💡 " + q.hint : "💡 需要提示嗎？"}</button>}
      <div className="opts-col">
        {opts.map((opt, idx) => {
          let cls = "opt-btn";
          if (answered) { if (opt.ok) cls += " correct"; else if (idx === sel) cls += " wrong"; else cls += " dim"; }
          return (
            <button key={idx} className={cls} onClick={() => pick(idx)} disabled={answered}>
              <span className="opt-label">{String.fromCharCode(65 + idx)}</span>
              <span style={{ flex: 1 }}>{opt.text}</span>
              {answered && idx === sel && <span style={{ marginLeft: "auto", fontSize: 18 }}>{opt.ok ? "✅" : "❌"}</span>}
              {answered && opt.ok && idx !== sel && <span style={{ marginLeft: "auto", fontSize: 18 }}>✅</span>}
            </button>
          );
        })}
      </div>
      {answered && (
        <div className={`feedback-banner ${opts[sel]?.ok ? "ok" : "no"}`}>
          <span style={{ fontSize: 24 }}>{opts[sel]?.ok ? "🎉" : "😅"}</span>
          <span style={{ fontWeight: 700, color: opts[sel]?.ok ? "#4ade80" : "#f87171", fontSize: 15 }}>{opts[sel]?.ok ? "答對了！" : "答錯了！"}</span>
          <span style={{ color: "#64748b", fontSize: 12 }}>詳解將在測驗結束後公布</span>
        </div>
      )}
      {answered && <button className="btn-primary" onClick={next}>{cur < quizData.length - 1 ? "下一題 →" : "查看成績 🎯"}</button>}
    </div>
  );
}

function ResultPhase({ student, score, record, onRestart }) {
  const grade = getGrade(score, quizData.length);
  const [show, setShow] = useState(false);
  const [submitStatus, setSubmitStatus] = useState("loading");

  useEffect(() => {
    submitToSheet(student, score, record).then(s => setSubmitStatus(s));
  }, []);

  return (
    <div className="card" style={{ maxWidth: 580, textAlign: "center", marginTop: 20 }}>
      <div className="student-bar" style={{ justifyContent: "center", marginBottom: 20 }}>
        <span>👤 {student.name}</span><span className="sep">|</span><span className="sid">{student.sid}</span>
      </div>
      <div style={{ fontSize: 56, marginBottom: 4 }}>{grade.emoji}</div>
      <h1 style={{ fontSize: 28, fontWeight: 900, color: grade.color, marginBottom: 6 }}>{grade.title}</h1>
      <p style={{ fontSize: 15, color: "#94a3b8", marginBottom: 24 }}>{grade.sub}</p>

      <div className="score-ring"><div className="num">{score}</div><div className="den">/ {quizData.length}</div></div>

      <div className="stat-row">
        <div className="stat-box"><div className="stat-num" style={{ color: "#4ade80" }}>{score}</div><div className="stat-label">答對</div></div>
        <div className="stat-box"><div className="stat-num" style={{ color: "#f87171" }}>{quizData.length - score}</div><div className="stat-label">答錯</div></div>
        <div className="stat-box"><div className="stat-num" style={{ color: "#facc15" }}>{Math.round((score / quizData.length) * 100)}%</div><div className="stat-label">正確率</div></div>
      </div>

      {submitStatus === "loading" && <div className="submit-status loading">📤 正在回傳成績給老師...</div>}
      {submitStatus === "ok" && <div className="submit-status ok">✅ 成績已成功回傳！老師可以看到你的成績了。</div>}
      {submitStatus === "error" && <div className="submit-status err">⚠️ 成績回傳失敗，請截圖給老師。</div>}
      {submitStatus === "skip" && <div className="submit-status loading">📋 成績僅顯示於此畫面，請截圖保存。</div>}

      <button className="review-toggle" onClick={() => setShow(!show)}>{show ? "收起詳解 ▲" : "📖 查看每題詳解 ▼"}</button>
      {show && (
        <div className="review-list">
          {record.map((r, i) => {
            const qd = quizData[r.qIdx]; const co = qd.opts.find(o => o.ok);
            return (
              <div key={i} className={`review-item ${r.correct ? "ok" : "no"}`}>
                <div className="review-header"><span>{r.correct ? "✅" : "❌"}</span><span className="review-qnum">Q{i + 1}</span></div>
                <p className="review-qtext">{qd.q}</p>
                {!r.correct && <div className="review-your"><span style={{ color: "#f87171", fontWeight: 600 }}>你的回答：</span>{r.chosenText}</div>}
                <div className="review-correct"><span style={{ color: "#4ade80", fontWeight: 600 }}>正確答案：</span>{co.text}</div>
                <div className="review-rat">{co.rat}</div>
              </div>
            );
          })}
        </div>
      )}
      <button className="btn-primary" style={{ marginTop: 12 }} onClick={onRestart}>再挑戰一次 🔄</button>
    </div>
  );
}

function App() {
  const [phase, setPhase] = useState("form");
  const [student, setStudent] = useState(null);
  const [finalScore, setFinalScore] = useState(0);
  const [record, setRecord] = useState([]);

  if (phase === "form") return <StudentForm onSubmit={s => { setStudent(s); setPhase("quiz"); }} />;
  if (phase === "quiz") return <QuizPhase student={student} onFinish={(sc, rec) => { setFinalScore(sc); setRecord(rec); setPhase("result"); }} />;
  return <ResultPhase student={student} score={finalScore} record={record} onRestart={() => { setPhase("form"); setStudent(null); setFinalScore(0); setRecord([]); }} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
