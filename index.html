<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>第一章-系統平台</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🖥️</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',sans-serif;background:linear-gradient(145deg,#0f0f1a,#1a1a2e,#16213e);min-height:100vh;color:#e2e8f0}
#root{min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:24px 16px}
.card{background:rgba(255,255,255,0.04);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.08);border-radius:24px;padding:28px 24px;width:100%;animation:fadeIn .35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.sbar{display:flex;gap:8px;align-items:center;font-size:13px;color:#a5b4fc;font-weight:600;margin-bottom:12px;padding:8px 12px;background:rgba(129,140,248,0.08);border-radius:10px;flex-wrap:wrap}
.sbar .sep{color:#475569}.sbar .dim{color:#94a3b8}.sbar .cls{color:#818cf8}
label.fl{display:block;font-size:13px;font-weight:700;color:#a5b4fc;margin-bottom:6px}
input.fi{width:100%;padding:12px 14px;border-radius:12px;border:2px solid rgba(255,255,255,0.1);background:rgba(0,0,0,0.25);color:#e2e8f0;font-size:15px;outline:none;transition:border-color .2s;font-family:inherit}
input.fi:focus{border-color:#818cf8}input.fi.err{border-color:#f87171}
.bp{background:linear-gradient(135deg,#818cf8,#6366f1);color:#fff;border:none;border-radius:14px;padding:14px 40px;font-size:17px;font-weight:700;cursor:pointer;width:100%;font-family:inherit;transition:transform .1s,box-shadow .2s}
.bp:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(99,102,241,.35)}.bp:active{transform:translateY(0)}.bp:disabled{opacity:.6;cursor:not-allowed;transform:none}
.pr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}.pl{font-size:13px;color:#94a3b8;font-weight:600}.si{font-size:13px;color:#fbbf24;font-weight:700}
.pb{height:6px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden;margin-bottom:24px}.pf{height:100%;background:linear-gradient(90deg,#818cf8,#6366f1);border-radius:3px;transition:width .4s ease}
.qt{font-size:18px;font-weight:700;line-height:1.7;margin:0 0 16px}
.hb{background:rgba(251,191,36,0.1);border:1px solid rgba(251,191,36,0.25);color:#fbbf24;border-radius:12px;padding:10px 16px;font-size:14px;cursor:pointer;margin-bottom:20px;width:100%;text-align:left;line-height:1.5;font-weight:500;font-family:inherit}
.oc{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.ob{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,0.04);border:2px solid rgba(255,255,255,0.08);border-radius:14px;padding:14px 16px;cursor:pointer;text-align:left;transition:all .2s;font-size:15px;color:#cbd5e1;line-height:1.5;font-family:inherit}
.ob:not(:disabled):hover{border-color:rgba(129,140,248,0.4);background:rgba(129,140,248,0.06)}.ob:disabled{cursor:default}
.ob.ok{background:rgba(74,222,128,0.15);border-color:#4ade80}.ob.no{background:rgba(248,113,113,0.15);border-color:#f87171}.ob.dm{opacity:.4}
.ol{background:rgba(129,140,248,0.15);color:#a5b4fc;width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0}
.fb{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:14px;border:1px solid;margin-bottom:16px;flex-wrap:wrap}
.fb.ok{background:rgba(74,222,128,0.08);border-color:#4ade80}.fb.no{background:rgba(248,113,113,0.08);border-color:#f87171}
.sr{width:120px;height:120px;border-radius:50%;background:rgba(129,140,248,0.1);border:4px solid #818cf8;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 24px}
.sr .n{font-size:42px;font-weight:900}.sr .d{font-size:16px;color:#94a3b8;margin-top:-4px}
.stw{display:flex;gap:12px;justify-content:center;margin-bottom:24px}
.stb{background:rgba(255,255,255,0.04);border-radius:14px;padding:12px 20px;flex:1;max-width:120px;text-align:center}
.stn{font-size:26px;font-weight:800}.stl{font-size:12px;color:#94a3b8}
.rt{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:#a5b4fc;border-radius:12px;padding:12px 24px;font-size:15px;font-weight:700;cursor:pointer;width:100%;margin-bottom:12px;font-family:inherit}
.rt:hover{background:rgba(255,255,255,0.1)}
.rl{text-align:left;margin-bottom:16px;max-height:500px;overflow-y:auto;display:flex;flex-direction:column;gap:10px}
.ri{background:rgba(0,0,0,0.25);border-radius:12px;padding:14px 16px;border-left:4px solid}.ri.ok{border-left-color:#4ade80}.ri.no{border-left-color:#f87171}
.rh{display:flex;gap:6px;align-items:center;margin-bottom:6px}.rqn{font-size:13px;font-weight:800;color:#a5b4fc}
.rqt{font-size:14px;line-height:1.6;margin:0 0 8px}
.ry{font-size:13px;color:#cbd5e1;margin-bottom:4px;padding:6px 10px;background:rgba(248,113,113,0.08);border-radius:8px}
.rc{font-size:13px;color:#cbd5e1;margin-bottom:4px;padding:6px 10px;background:rgba(74,222,128,0.08);border-radius:8px}
.rr{font-size:13px;color:#94a3b8;line-height:1.6;margin-top:6px;font-style:italic}
.em{color:#f87171;font-size:13px;margin-bottom:12px}
.sm{padding:10px 16px;border-radius:10px;font-size:13px;margin-bottom:16px;text-align:center;font-weight:600}
.sm.ok{background:rgba(74,222,128,0.1);color:#4ade80}.sm.er{background:rgba(248,113,113,0.1);color:#f87171}.sm.ld{background:rgba(129,140,248,0.1);color:#a5b4fc}
.ld{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.2);border-top-color:#a5b4fc;border-radius:50%;animation:spin .6s linear infinite;margin-right:8px;vertical-align:middle}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const{useState,useEffect}=React;
const API="https://script.google.com/macros/s/AKfycbxnFE-1AgjfQV6kPD-xLqqZO0i7bEKvumretjxlgPWhSbj7HKZ1UO_t95TW2k5VDP43jg/exec";
const QUIZ_NAME="第一章-系統平台";
const Q=[
{q:"買電腦時，店員激動地推銷：「這台的『大腦』超級聰明！」請問這個「大腦」是指哪個零件？",o:[{t:"硬碟 (SSD)",r:"硬碟是負責長期儲存的「書櫃」，不負責動腦思考。",k:0},{t:"中央處理器 (CPU)",r:"沒錯！CPU 就是電腦的大腦，負責思考和運算，像 Intel i5、i7 都是它。",k:1},{t:"主記憶體 (RAM)",r:"記憶體像「書桌」，暫時擺放資料，不負責運算。",k:0},{t:"顯示卡 (GPU)",r:"顯示卡是專門處理畫面的「美術大師」，不是總指揮。",k:0}],h:"知名品牌有 Intel（i5、i7）和 AMD。"},
{q:"你急著上線打排位賽，結果電腦開機等了 3 分鐘，泡麵都快糊了！為了加速開機，系統該裝在哪裡？",o:[{t:"傳統硬碟 (HDD)",r:"傳統硬碟用磁盤慢慢轉，像在圖書館翻書找資料，超慢！",k:0},{t:"固態硬碟 (SSD)",r:"正解！SSD 沒有會轉的零件，讀取像開任意門，開機只要 5 秒！",k:1},{t:"雲端硬碟 (Google Drive)",r:"雲端是備份用的，電腦還是得靠自己的硬碟開機。",k:0},{t:"隨身碟 (USB)",r:"隨身碟容量太小，也不適合裝作業系統。",k:0}],h:"找那種裡面沒有會轉的機械零件、讀取速度快如閃電的儲存裝置。"},
{q:"Intel CPU 的 i3、i5、i7、i9 代表什麼意思？",o:[{t:"記憶體容量大小",r:"i3～i9 是 CPU 等級，跟記憶體完全無關。",k:0},{t:"螢幕解析度等級",r:"螢幕解析度用 FHD、4K 來分，不是用 i 幾。",k:0},{t:"處理器的性能等級",r:"對！像車子的等級：i3 代步車→i5 休旅車→i7 跑車→i9 千萬超跑。",k:1},{t:"硬碟的讀寫速度",r:"硬碟速度看 SSD/HDD 規格，跟 i 幾無關。",k:0}],h:"想像成車子的性能等級，從代步車到千萬超跑。"},
{q:"網購筆電看到「On board 記憶體 8GB」，這代表什麼？",o:[{t:"附贈免費衝浪板",r:"英文不是這樣翻的啦！",k:0},{t:"記憶體被銲死在主機板上，無法擴充",r:"答對了！如果覺得 8GB 不夠用，是絕對無法升級的，買之前一定要確認！",k:1},{t:"這台可以帶上飛機",r:"所有筆電都能帶上飛機。",k:0},{t:"開機速度比別人快一倍",r:"銲在主機板上不代表速度變快。",k:0}],h:"想像書桌被強力膠黏死在地板上，以後換不了更大的桌子。"},
{q:"想玩《特戰英豪》等 3D 遊戲不卡成投影片，筆電一定要有哪個零件？",o:[{t:"高級視訊鏡頭",r:"視訊鏡頭只負責拍你的臉，不負責跑遊戲畫面。",k:0},{t:"獨立顯示卡（獨顯）",r:"對！獨顯是額外花錢外包聘請的專業 3D 繪圖大師，像 RTX 3070！",k:1},{t:"超高音質喇叭",r:"聲音再好聽，畫面卡成狗也玩不下去。",k:0},{t:"觸控螢幕",r:"打 3D 大作通常用鍵盤滑鼠，觸控螢幕幫不上忙。",k:0}],h:"像 NVIDIA RTX 3070 這種零件，有自己專屬的畫室跟工具。"},
{q:"如果電腦是一間公司，作業系統（OS）扮演什麼角色？",o:[{t:"大樓警衛",r:"警衛是防毒軟體的角色，負責擋壞人。",k:0},{t:"外送小弟",r:"外送比較像網路單元，負責傳送資料。",k:0},{t:"超級管家",r:"正確！OS 開機第一個上班、關機最後下班，負責排隊、分空間、管檔案、管設備。",k:1},{t:"實習生",r:"作業系統是整台電腦的核心管理者，不是實習生。",k:0}],h:"它開機第一個上班，關機最後下班，幫你管理所有軟硬體。"},
{q:"電腦五大單元中，鍵盤和滑鼠屬於哪個單元？",o:[{t:"輸入單元",r:"沒錯！鍵盤、滑鼠、麥克風都是把資料「送進來」的輸入裝置，像耳朵和眼睛。",k:1},{t:"輸出單元",r:"輸出是把結果「送出去」，像螢幕和喇叭。",k:0},{t:"控制單元",r:"控制單元在 CPU 裡面，負責指揮大家做事。",k:0},{t:"記憶單元",r:"記憶單元負責暫存或長期存放資料，像 RAM 和硬碟。",k:0}],h:"把資料「送進」電腦的裝置，就像人的耳朵和眼睛。"},
{q:"記憶體階層中，離 CPU 最近、速度最快但容量最小的是？",o:[{t:"輔助記憶體 (SSD/HDD)",r:"SSD 在最底層，容量大但離 CPU 最遠。",k:0},{t:"主記憶體 (RAM)",r:"RAM 像書桌，中間層級，不是最快的。",k:0},{t:"暫存器 (Register)",r:"對！暫存器就在 CPU 裡面，像手上正在拿著的東西，速度最快但容量最小！",k:1},{t:"快取記憶體 (Cache)",r:"Cache 是第二層，像口袋裡的東西，很快但不是最快。",k:0}],h:"越靠近 CPU 越快：手上拿的→口袋裡→書桌上→書櫃裡。"},
{q:"快取記憶體（Cache）的 Hit（命中）是什麼意思？",o:[{t:"CPU 找的資料剛好在快取裡，直接拿來用",r:"對！就像口袋裡剛好有，不用走到書桌拿，省下很多時間！",k:1},{t:"CPU 當機了",r:"Hit 是「命中」的意思，不是當機。",k:0},{t:"資料傳送失敗",r:"傳送失敗叫 Error，不叫 Hit。",k:0},{t:"硬碟讀寫速度很快",r:"Hit 跟硬碟無關，是指快取裡找到了資料。",k:0}],h:"想像要找東西，口袋裡剛好有（Hit）就不用走到書桌（Miss）。"},
{q:"CPU 排程中的「FCFS（先來先做）」，最像生活中的什麼？",o:[{t:"火鍋店限時 90 分鐘",r:"限時輪流是 RR 循環排程的概念。",k:0},{t:"去銀行抽號碼牌排隊",r:"對！誰先來就先服務，公平簡單，就像傳統小吃店先來先點。",k:1},{t:"只買一樣東西的人先結帳",r:"這是 SJF 最短工作優先的概念。",k:0},{t:"VIP 頭等艙優先登機",r:"這是優先權排程的概念。",k:0}],h:"最公平也最簡單的排法，先到先做，沒人抱怨插隊。"},
{q:"三個程序 A(18ms)、B(3ms)、C(9ms) 用 SJF 排程，平均等待時間是多少？",o:[{t:"13 毫秒",r:"13ms 是用 FCFS（先來先做）的結果。",k:0},{t:"5 毫秒",r:"正解！SJF 順序是 B→C→A，等待時間 (0+3+12)÷3 = 5ms，最快！",k:1},{t:"9 毫秒",r:"9ms 是 RR 循環排程的結果。",k:0},{t:"7 毫秒",r:"7ms 是優先權排程的結果。",k:0}],h:"SJF 讓最短的先做：B(3ms)→C(9ms)→A(18ms)，算等待時間。"},
{q:"RR 循環排程的最大優點是什麼？",o:[{t:"平均等待時間最短",r:"最短等待時間是 SJF 的優點。",k:0},{t:"規則最簡單",r:"最簡單的是 FCFS 先來先做。",k:0},{t:"每個程序都能公平地用到 CPU",r:"答對！像火鍋店限時 90 分鐘，每個人都吃得到，最公平！",k:1},{t:"VIP 可以優先處理",r:"這是優先權排程的特色。",k:0}],h:"像火鍋店限時制，每人輪流用固定時間，大家都能吃到。"},
{q:"你正在玩手遊，突然有電話打進來，手機的 CPU 怎麼處理？",o:[{t:"把遊戲完全關閉再接電話",r:"遊戲不會被關掉，只是推到背景。",k:0},{t:"電話進入等待，等你玩完再接",r:"電話是最高優先權，不可能等你打完遊戲！",k:0},{t:"電話立即搶佔 CPU，遊戲推到背景",r:"對！電話最優先，CPU 馬上暫存遊戲進度（Context Switch），強制切換。",k:1},{t:"兩個同時跑，完全不受影響",r:"CPU 需要切換處理，不是真的同時跑。",k:0}],h:"電話是最高優先權的任務，會立即搶佔 CPU。"},
{q:"網路傳資料時把資料切成「封包」傳送，最大的好處是什麼？",o:[{t:"資料傳輸不需要網路",r:"封包還是要透過網路傳送的。",k:0},{t:"很多人可以同時傳，不用排隊等一個人傳完",r:"正確！封包交換讓大家的資料可以混著傳，不用排隊等。",k:1},{t:"傳送速度永遠不會變慢",r:"太多人同時用還是會「塞車」，可能掉封包。",k:0},{t:"資料一定不會遺失",r:"封包可能遺失，所以需要 TCP 來確認。",k:0}],h:"切成小塊走不同路線，像很多快遞各自送，不用排隊等。"},
{q:"哪一個 IP 位址是「不合法」的？",o:[{t:"192.168.1.1",r:"每段都在 0～255 範圍內，合法！",k:0},{t:"140.112.8.116",r:"這是台師大的 IP，每段都合法！",k:0},{t:"10.0.0.255",r:"每段都在 0～255 範圍內，合法！",k:0},{t:"0.100.200.300",r:"答對！300 超過 255，不合法！每段最大只能 255。",k:1}],h:"IP 每段用 8 位元表示，2⁸=256，所以範圍是 0～255。"},
{q:"為什麼有了 IP 位址還需要「網域名稱」(如 www.google.com)？",o:[{t:"IP 位址已經被淘汰了",r:"IP 位址還是網路的基礎，沒有被淘汰。",k:0},{t:"數字太難記，用名字比較好記",r:"對！DNS 就是把好記的名字翻譯成數字 IP 位址的翻譯官。",k:1},{t:"網域名稱傳輸速度比較快",r:"用哪個名字不影響速度，最終都是靠 IP 傳送。",k:0},{t:"只有大公司才有 IP 位址",r:"每台上網設備都有 IP 位址。",k:0}],h:"就像手機通訊錄，用名字找人比背電話號碼容易多了。"},
{q:"雲端運算的三種服務中，工程師用來寫程式的「PaaS」是指？",o:[{t:"軟體即服務 (SaaS)",r:"SaaS 是直接用做好的 App，像 Gmail。",k:0},{t:"平台即服務 (PaaS)",r:"正確！像 Google Colab，提供開發環境讓工程師直接寫程式，不用自己架設。",k:1},{t:"基礎架構即服務 (IaaS)",r:"IaaS 是租整台虛擬電腦，企業在用。",k:0},{t:"資料即服務 (DaaS)",r:"課程沒有提到 DaaS 這個分類。",k:0}],h:"P 代表 Platform（平台），提供寫程式的環境。"},
{q:"5G 的「超低延遲」特性，對哪種應用最重要？",o:[{t:"看 YouTube 影片",r:"看影片用 4G 就夠快了，延遲影響不大。",k:0},{t:"傳 LINE 訊息",r:"傳訊息對延遲要求不高。",k:0},{t:"自動駕駛車即時反應",r:"正確！自駕車需要瞬間煞車，晚 0.1 秒可能就出車禍，超低延遲是保命符！",k:1},{t:"下載手機 App",r:"下載 App 跟「快速」有關，跟「低延遲」關係不大。",k:0}],h:"想想哪個應用如果慢了 0.1 秒就可能出人命。"},
{q:"區塊鏈最大的特色是什麼？",o:[{t:"由一個中央銀行管理所有帳本",r:"區塊鏈是「去中心化」，沒有中央管理員！",k:0},{t:"速度比傳統資料庫快很多",r:"區塊鏈速度其實比傳統資料庫慢。",k:0},{t:"去中心化、所有人一起記帳、不可竄改",r:"對！像全班每人都記一份帳，想改帳本就要同時改全班的，根本不可能！",k:1},{t:"只能用來做比特幣",r:"區塊鏈還能用在食安履歷、電子病歷等。",k:0}],h:"想像班費由全班一起記帳，沒有人能偷偷竄改。"},
{q:"量子電腦的 Qubit 跟一般電腦的 Bit 最大差別是什麼？",o:[{t:"Qubit 只能是 0",r:"一般 Bit 可以是 0 或 1，Qubit 更厲害。",k:0},{t:"Qubit 可以同時是 0 和 1（疊加態）",r:"正確！像旋轉中的硬幣，同時是正面又是反面，能同時計算很多可能性！",k:1},{t:"Qubit 體積比 Bit 大一千倍",r:"Qubit 的差別在運算方式，不是體積。",k:0},{t:"Qubit 不需要用電",r:"量子電腦還是要用電，而且需要極低溫環境。",k:0}],h:"一般 Bit 像硬幣只能正面或反面，Qubit 像旋轉中的硬幣同時是兩面。"}
];
function shuf(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}
function grd(s,t){const p=s/t;if(p>=.9)return{e:"🏆",t:"電腦天才！",s:"你根本是 IT 部門本人吧？",c:"#FFD700"};if(p>=.7)return{e:"🌟",t:"數位達人！",s:"你的資訊素養超越 87% 的人！",c:"#7CF5FF"};if(p>=.5)return{e:"📱",t:"科技小白進化中",s:"再加把勁就能成為科技達人！",c:"#A78BFA"};return{e:"🐣",t:"數位新生兒",s:"沒關係！看完解答你已經升級了！",c:"#FB923C"}}
async function apiG(p){const r=await fetch(API+"?"+new URLSearchParams(p),{redirect:"follow"});return r.json()}
async function apiP(d){await fetch(API,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},body:JSON.stringify(d)})}

function Login({onOk}){
  const[sid,setS]=useState("");const[pw,setP]=useState("");const[err,setE]=useState("");const[ld,setL]=useState(false);
  const go=async()=>{if(!sid.trim()||!pw.trim()){setE("請輸入學號和密碼");return}setL(true);setE("");try{const r=await apiG({action:"login",sid:sid.trim(),pw:pw.trim()});if(r.status==="ok")onOk({sid:sid.trim(),name:r.name,cls:r.className,chg:r.needChangePassword,opw:pw.trim()});else setE(r.message||"登入失敗")}catch(e){setE("網路連線失敗，請稍後再試")}setL(false)};
  return(<div className="card" style={{maxWidth:420,marginTop:50,textAlign:"center"}}><div style={{fontSize:56,marginBottom:12}}>🖥️</div><h1 style={{fontSize:28,fontWeight:900,marginBottom:8}}>{QUIZ_NAME}</h1><p style={{fontSize:14,color:"#94a3b8",marginBottom:24}}>請用學號登入開始測驗</p><div style={{textAlign:"left",marginBottom:16}}><label className="fl">學號</label><input className={"fi"+(err&&!sid.trim()?" err":"")} placeholder="請輸入學號" value={sid} onChange={e=>setS(e.target.value)} onKeyDown={e=>e.key==="Enter"&&document.getElementById("pw")?.focus()}/></div><div style={{textAlign:"left",marginBottom:20}}><label className="fl">密碼</label><input id="pw" type="password" className={"fi"+(err&&!pw.trim()?" err":"")} placeholder="首次登入密碼為學號" value={pw} onChange={e=>setP(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()}/></div>{err&&<p className="em">⚠️ {err}</p>}<button className="bp" onClick={go} disabled={ld}>{ld?<><span className="ld"/>登入中...</>:"登入 →"}</button><p style={{fontSize:11,color:"#475569",marginTop:16}}>首次登入密碼為學號，登入後需修改密碼</p><p style={{fontSize:10,color:"#334155",marginTop:8}}>v3.2</p></div>);
}
function ChgPw({stu,onOk}){
  const[np,setN]=useState("");const[np2,setN2]=useState("");const[err,setE]=useState("");const[ld,setL]=useState(false);
  const go=async()=>{if(np.length<4){setE("新密碼至少 4 個字元");return}if(np===stu.sid){setE("新密碼不能和學號一樣");return}if(np!==np2){setE("兩次密碼不一致");return}setL(true);setE("");try{const r=await apiG({action:"changepw",sid:stu.sid,oldpw:stu.opw,newpw:np});if(r.status==="ok")onOk();else setE(r.message||"失敗")}catch(e){setE("網路錯誤")}setL(false)};
  return(<div className="card" style={{maxWidth:420,marginTop:50,textAlign:"center"}}><div style={{fontSize:48,marginBottom:8}}>🔑</div><h2 style={{fontSize:22,fontWeight:800,marginBottom:6}}>首次登入，請修改密碼</h2><p style={{fontSize:14,color:"#94a3b8",marginBottom:20}}>Hi {stu.name}，請設定新密碼</p><div style={{textAlign:"left",marginBottom:16}}><label className="fl">新密碼（至少 4 字元）</label><input type="password" className="fi" placeholder="輸入新密碼" value={np} onChange={e=>setN(e.target.value)}/></div><div style={{textAlign:"left",marginBottom:20}}><label className="fl">確認新密碼</label><input type="password" className="fi" placeholder="再輸入一次" value={np2} onChange={e=>setN2(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()}/></div>{err&&<p className="em">⚠️ {err}</p>}<button className="bp" onClick={go} disabled={ld}>{ld?<><span className="ld"/>儲存中...</>:"確認修改 ✓"}</button></div>);
}
function Quiz({stu,onEnd}){
  const[c,setC]=useState(0);const[sel,setSel]=useState(null);const[done,setDone]=useState(false);const[sc,setSc]=useState(0);const[ht,setHt]=useState(false);const[rec,setRec]=useState([]);const[opts,setOpts]=useState([]);
  useEffect(()=>{setOpts(shuf(Q[c].o))},[c]);
  const pick=i=>{if(done)return;setSel(i);setDone(true);if(opts[i].k)setSc(s=>s+1);setRec(r=>[...r,{qi:c,ct:opts[i].t,ok:!!opts[i].k}])};
  const nxt=()=>{if(c<Q.length-1){setC(x=>x+1);setSel(null);setDone(false);setHt(false)}else{onEnd(rec.reduce((a,r)=>a+(r.ok?1:0),0),rec)}};
  const q=Q[c];const pct=((c+1)/Q.length)*100;
  return(<div className="card" style={{maxWidth:640}} key={c}>
    <div className="sbar"><span>👤 {stu.name}</span><span className="sep">|</span><span className="dim">{stu.sid}</span><span className="sep">|</span><span className="cls">{stu.cls}</span></div>
    <div className="pr"><span className="pl">{c+1} / {Q.length}</span><span className="si">🏅 {sc} 分</span></div>
    <div className="pb"><div className="pf" style={{width:pct+"%"}}/></div>
    <h2 className="qt">{q.q}</h2>
    {!done&&<button className="hb" onClick={()=>setHt(!ht)}>{ht?"💡 "+q.h:"💡 需要提示嗎？"}</button>}
    <div className="oc">{opts.map((o,i)=>{let cn="ob";if(done){if(o.k)cn+=" ok";else if(i===sel)cn+=" no";else cn+=" dm"}return(<button key={i} className={cn} onClick={()=>pick(i)} disabled={done}><span className="ol">{String.fromCharCode(65+i)}</span><span style={{flex:1}}>{o.t}</span>{done&&i===sel&&<span style={{marginLeft:"auto",fontSize:18}}>{o.k?"✅":"❌"}</span>}{done&&o.k&&i!==sel&&<span style={{marginLeft:"auto",fontSize:18}}>✅</span>}</button>)})}</div>
    {done&&<div className={"fb "+(opts[sel]?.k?"ok":"no")}><span style={{fontSize:24}}>{opts[sel]?.k?"🎉":"😅"}</span><span style={{fontWeight:700,color:opts[sel]?.k?"#4ade80":"#f87171",fontSize:15}}>{opts[sel]?.k?"答對了！":"答錯了！"}</span><span style={{color:"#64748b",fontSize:12}}>詳解於測驗結束後公布</span></div>}
    {done&&<button className="bp" onClick={nxt}>{c<Q.length-1?"下一題 →":"查看成績 🎯"}</button>}
  </div>);
}
function Result({stu,sc,rec,onOut}){
  const g=grd(sc,Q.length);const[sh,setSh]=useState(false);const[ss,setSs]=useState("ld");
  useEffect(()=>{apiP({action:"submit_score",quizName:QUIZ_NAME,sid:stu.sid,name:stu.name,className:stu.cls,score:sc,total:Q.length,record:rec.map(r=>({correct:r.ok}))}).then(()=>setSs("ok")).catch(()=>setSs("er"))},[]);
  return(<div className="card" style={{maxWidth:580,textAlign:"center",marginTop:20}}>
    <div className="sbar" style={{justifyContent:"center",marginBottom:20}}><span>👤 {stu.name}</span><span className="sep">|</span><span className="dim">{stu.sid}</span><span className="sep">|</span><span className="cls">{stu.cls}</span></div>
    <div style={{fontSize:56,marginBottom:4}}>{g.e}</div><h1 style={{fontSize:28,fontWeight:900,color:g.c,marginBottom:6}}>{g.t}</h1><p style={{fontSize:15,color:"#94a3b8",marginBottom:24}}>{g.s}</p>
    <div className="sr"><div className="n">{sc}</div><div className="d">/ {Q.length}</div></div>
    <div className="stw"><div className="stb"><div className="stn" style={{color:"#4ade80"}}>{sc}</div><div className="stl">答對</div></div><div className="stb"><div className="stn" style={{color:"#f87171"}}>{Q.length-sc}</div><div className="stl">答錯</div></div><div className="stb"><div className="stn" style={{color:"#facc15"}}>{Math.round(sc/Q.length*100)}%</div><div className="stl">正確率</div></div></div>
    {ss==="ld"&&<div className="sm ld"><span className="ld"/>正在回傳成績...</div>}
    {ss==="ok"&&<div className="sm ok">✅ 成績已成功回傳！</div>}
    {ss==="er"&&<div className="sm er">⚠️ 回傳失敗，請截圖給老師</div>}
    <button className="rt" onClick={()=>setSh(!sh)}>{sh?"收起詳解 ▲":"📖 查看每題詳解 ▼"}</button>
    {sh&&<div className="rl">{rec.map((r,i)=>{const qd=Q[r.qi];const co=qd.o.find(x=>x.k);return(<div key={i} className={"ri "+(r.ok?"ok":"no")}><div className="rh"><span>{r.ok?"✅":"❌"}</span><span className="rqn">Q{i+1}</span></div><p className="rqt">{qd.q}</p>{!r.ok&&<div className="ry"><span style={{color:"#f87171",fontWeight:600}}>你的回答：</span>{r.ct}</div>}<div className="rc"><span style={{color:"#4ade80",fontWeight:600}}>正確答案：</span>{co.t}</div><div className="rr">{co.r}</div></div>)})}</div>}
    <button className="bp" style={{marginTop:12}} onClick={onOut}>登出 🔄</button>
  </div>);
}
function App(){
  const[ph,setPh]=useState("login");const[stu,setStu]=useState(null);const[fs,setFs]=useState(0);const[rec,setRec]=useState([]);
  if(ph==="login")return<Login onOk={s=>{setStu(s);setPh(s.chg?"chgpw":"quiz")}}/>;
  if(ph==="chgpw")return<ChgPw stu={stu} onOk={()=>setPh("quiz")}/>;
  if(ph==="quiz")return<Quiz stu={stu} onEnd={(s,r)=>{setFs(s);setRec(r);setPh("result")}}/>;
  return<Result stu={stu} sc={fs} rec={rec} onOut={()=>{setPh("login");setStu(null);setFs(0);setRec([])}}/>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
